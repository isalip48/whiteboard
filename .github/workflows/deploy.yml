name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─── CI Job ──────────────────────────────────────────────────────────────────
  # Only checks the server code — skips Next.js build because
  # Tailwind CSS v4 uses platform-specific binaries that don't
  # install correctly in GitHub Actions from a Windows lockfile.
  # The actual Next.js build is validated by Docker on the server.
  ci:
    name: Lint & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Check server code only — no platform binary issues here
      - name: Install server dependencies
        working-directory: apps/server
        run: npm install

      # Verify server entry point exists and is valid JS
      - name: Verify server
        working-directory: apps/server
        run: node --check src/index.js

  # ─── CD Job ──────────────────────────────────────────────────────────────────
  cd:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/whiteboard
            echo "Pulling latest code..."
            git pull origin main

            echo "Rebuilding containers..."
            docker-compose down
            docker container prune -f
            docker-compose up --build -d

            echo "Checking status..."
            docker-compose ps

            echo "Deploy complete!"
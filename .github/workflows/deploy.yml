name: CI/CD Pipeline

on:
  push:
    branches:
      - main        # only trigger on pushes to main branch
  pull_request:
    branches:
      - main        # also run CI on pull requests (but not CD)

jobs:

  #  CI Job 
  # Runs on every push and pull request.
  # Catches broken builds before they reach the server.
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest   # GitHub provides a free Ubuntu VM

    steps:
      # Step 1: Download your code onto the GitHub VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install web dependencies
      - name: Install web dependencies
        working-directory: apps/web
        run: npm install
        # using npm install instead of npm ci
        # because the lockfile is inside apps/web

      # Install server dependencies
      - name: Install server dependencies
        working-directory: apps/server
        run: npm install

      # Build Next.js to catch errors
      - name: Build Next.js
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_SOCKET_SERVER_URL: http://localhost:4000

  # ─── CD Job ─────────────────────────────────────────────────────────────────
  # Only runs after CI passes AND only on pushes to main (not PRs).
  # SSHs into the AWS server and redeploys.
  cd:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/whiteboard

            echo "Pulling latest code..."
            git pull origin main

            echo "Restarting containers..."
            docker-compose down
            docker container prune -f
            docker-compose up --build -d

            echo "Checking status..."
            docker-compose ps

            echo "Deploy complete!"